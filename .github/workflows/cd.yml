# ============================================================
# Pipeline de Deployment - SportClub
# Actividad 3: Acceptance Tests + Deploy + Rollback (Blue-Green)
#
# Estrategia: Blue-Green Deployment
#   - El ambiente "Blue" es la versión activa en producción
#   - El ambiente "Green" recibe la nueva versión
#   - Si las pruebas pasan, se hace el switch de tráfico Blue→Green
#   - Si algo falla, el rollback es inmediato (volver a Blue)
#
# Se activa solo en push a 'main' (versión estable)
# ============================================================

name: CD Pipeline - Deploy & Rollback

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Permite ejecución manual desde GitHub

env:
  APP_NAME: sportclub
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sportclub-app

jobs:

  # ----------------------------------------------------------
  # STAGE 1: Acceptance Tests (pruebas de aceptación)
  # Validan que la aplicación cumple los criterios del negocio
  # antes de cualquier despliegue
  # ----------------------------------------------------------
  acceptance-tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Levantar ambiente temporal para acceptance tests
      - name: Levantar ambiente de acceptance tests
        run: |
          echo "Iniciando ambiente de acceptance tests..."
          # En un proyecto real, aquí se usa docker-compose o similar
          # docker-compose -f docker-compose.test.yml up -d

      # Ejecutar pruebas de aceptación
      # Estas pruebas verifican flujos completos del negocio
      - name: Ejecutar acceptance tests
        run: |
          mvn verify -Pacceptance-tests
          echo "Acceptance tests completadas exitosamente"

      - name: Publicar resultados acceptance tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: acceptance-test-results
          path: target/failsafe-reports/

  # ----------------------------------------------------------
  # STAGE 2: Build de imagen Docker
  # ----------------------------------------------------------
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: acceptance-tests
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Login al registro de contenedores de GitHub
      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generar metadatos de la imagen (tag con SHA del commit)
      - name: Generar metadatos de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Construir y publicar la imagen
      - name: Build y push de imagen Docker
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ----------------------------------------------------------
  # STAGE 3: Deploy Blue-Green al ambiente de pruebas
  # El ambiente "Green" recibe la nueva versión
  # ----------------------------------------------------------
  deploy-green:
    name: Deploy al ambiente Green (pruebas)
    runs-on: ubuntu-latest
    needs: build-image
    environment: staging   # Requiere aprobación en GitHub Environments

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Guardar la versión actualmente en producción (Blue) para rollback
      - name: Guardar versión Blue (actual en producción)
        id: save-blue
        run: |
          # En un entorno real, se consulta el deployment actual
          # BLUE_VERSION=$(kubectl get deployment sportclub-blue -o jsonpath='{.spec.template.spec.containers[0].image}')
          BLUE_VERSION="ghcr.io/${{ github.repository }}/sportclub-app:previous"
          echo "blue-version=${BLUE_VERSION}" >> $GITHUB_OUTPUT
          echo "Versión Blue guardada: ${BLUE_VERSION}"

      # Desplegar la nueva versión en el ambiente Green
      - name: Desplegar nueva versión en Green
        run: |
          echo "Desplegando versión ${{ needs.build-image.outputs.image-tag }} en Green..."
          # En Kubernetes:
          # kubectl set image deployment/sportclub-green app=${{ needs.build-image.outputs.image-tag }}
          # kubectl rollout status deployment/sportclub-green
          echo "Despliegue en Green completado"

      # Verificar que el ambiente Green responde correctamente
      - name: Health check del ambiente Green
        run: |
          echo "Verificando salud del ambiente Green..."
          # curl --retry 5 --retry-delay 5 -f http://green.sportclub.internal/actuator/health
          echo "Health check exitoso"

    outputs:
      blue-version: ${{ steps.save-blue.outputs.blue-version }}

  # ----------------------------------------------------------
  # STAGE 4: Smoke tests sobre el ambiente Green
  # Pruebas rápidas de humo para validar el deploy
  # ----------------------------------------------------------
  smoke-tests:
    name: Smoke Tests en Green
    runs-on: ubuntu-latest
    needs: deploy-green

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar smoke tests contra ambiente Green
        run: |
          echo "Ejecutando smoke tests contra Green..."
          mvn verify -Psmoke-tests -Dtest.base.url=http://green.sportclub.internal
          echo "Smoke tests pasaron en Green"

  # ----------------------------------------------------------
  # STAGE 5: Switch de tráfico Blue → Green (Producción)
  # Solo se ejecuta si los smoke tests pasan
  # ----------------------------------------------------------
  switch-traffic:
    name: Switch de tráfico a Green (Producción)
    runs-on: ubuntu-latest
    needs: smoke-tests
    environment: production   # Requiere aprobación manual en GitHub

    steps:
      - name: Redirigir tráfico de Blue a Green
        run: |
          echo "Redirigiendo el 100% del tráfico al ambiente Green..."
          # En Kubernetes con Ingress:
          # kubectl patch ingress sportclub-ingress -p '{"spec":{"rules":[{"http":{"paths":[{"backend":{"service":{"name":"sportclub-green"}}}]}}]}}'
          echo "Tráfico redirigido a Green. Green es ahora Producción."

      - name: Registrar nueva versión como Blue (para próximo deploy)
        run: |
          echo "Actualizando etiqueta Blue a la versión actual..."
          # docker tag ${{ needs.build-image.outputs.image-tag }} sportclub-app:blue
          echo "La versión Green ahora es la nueva Blue"

  # ----------------------------------------------------------
  # STAGE 6: Rollback automático
  # Se ejecuta SOLO si el switch o los smoke tests fallan
  # ----------------------------------------------------------
  rollback:
    name: Rollback a versión Blue
    runs-on: ubuntu-latest
    needs: [deploy-green, smoke-tests, switch-traffic]
    # Se activa si cualquier stage posterior al deploy falla
    if: failure()

    steps:
      - name: Revertir al ambiente Blue (rollback)
        run: |
          BLUE_VERSION="${{ needs.deploy-green.outputs.blue-version }}"
          echo "Iniciando rollback a versión: ${BLUE_VERSION}"

          # En Kubernetes:
          # kubectl set image deployment/sportclub-green app=${BLUE_VERSION}
          # kubectl rollout status deployment/sportclub-green

          echo "Rollback completado. Sistema restaurado a la versión estable Blue."

      - name: Notificar rollback
        run: |
          echo "Notificando al equipo sobre el rollback..."
          echo "El pipeline de deploy falló. Se revirtió automáticamente a la versión estable."
          # Aquí se integraría con Slack, email, PagerDuty, etc.
