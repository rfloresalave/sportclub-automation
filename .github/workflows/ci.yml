# ============================================================
# Pipeline de Integración Continua (CI) - SportClub
# Actividad 2: Build + Pruebas Unitarias + Pruebas de Integración
#
# Se activa en:
#   - Push a ramas main, develop o cualquier rama feature/*
#   - Pull Requests hacia main o develop
# ============================================================

name: CI Pipeline - Build & Test

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ----------------------------------------------------------
  # STAGE 1: Build del proyecto con Maven
  # ----------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Configurar Java 17
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Compilar el proyecto (sin ejecutar pruebas)
      - name: Compilar con Maven
        run: mvn clean compile -DskipTests

      # 4. Guardar los artefactos compilados para las siguientes etapas
      - name: Guardar artefactos de compilación
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: target/
          retention-days: 1

  # ----------------------------------------------------------
  # STAGE 2: Pruebas Unitarias
  # Depende de que el build sea exitoso
  # ----------------------------------------------------------
  unit-tests:
    name: Pruebas Unitarias
    runs-on: ubuntu-latest
    needs: build   # Solo corre si el stage 'build' pasó

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Ejecutar pruebas unitarias con Surefire
      # Las clases *Test.java son incluidas automáticamente
      - name: Ejecutar pruebas unitarias
        run: mvn test

      # Publicar reporte de resultados de pruebas
      - name: Publicar resultados de pruebas unitarias
        uses: actions/upload-artifact@v4
        if: always()   # Se sube aunque las pruebas fallen
        with:
          name: unit-test-results
          path: target/surefire-reports/

      # Publicar reporte de cobertura JaCoCo
      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

  # ----------------------------------------------------------
  # STAGE 3: Pruebas de Integración
  # Depende de que las pruebas unitarias pasen
  # ----------------------------------------------------------
  integration-tests:
    name: Pruebas de Integración
    runs-on: ubuntu-latest
    needs: unit-tests   # Solo corre si 'unit-tests' pasó

    services:
      # Servicio de base de datos para las pruebas de integración
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sportclub_test
          POSTGRES_USER: sportclub
          POSTGRES_PASSWORD: sportclub123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Ejecutar pruebas de integración con Failsafe
      # Las clases *IT.java son incluidas automáticamente
      - name: Ejecutar pruebas de integración
        run: mvn verify -DskipUnitTests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sportclub_test
          SPRING_DATASOURCE_USERNAME: sportclub
          SPRING_DATASOURCE_PASSWORD: sportclub123

      # Publicar reporte de pruebas de integración
      - name: Publicar resultados de pruebas de integración
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: target/failsafe-reports/

  # ----------------------------------------------------------
  # STAGE 4: Notificación de resultado final
  # ----------------------------------------------------------
  notify:
    name: Notificación
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Resultado del pipeline
        run: |
          if [[ "${{ needs.unit-tests.result }}" == "success" && "${{ needs.integration-tests.result }}" == "success" ]]; then
            echo "Pipeline exitoso: todas las pruebas pasaron."
          else
            echo "Pipeline fallido: revisa los reportes de pruebas."
            exit 1
          fi
